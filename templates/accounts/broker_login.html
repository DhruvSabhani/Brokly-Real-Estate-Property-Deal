{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
  <head>
    {% load static %}
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{% static 'Resources/bootstrap-5.3.8-dist/css/bootstrap.min.css' %}" />
    <script src="{% static 'Resources/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js' %}"></script>
    {% tailwind_css %}
    <title>Login to │ Brokly Broker</title>
    <style>
      body {
        background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
      }
      
      @keyframes fadeInUp {
        from {
          opacity: 0;
          z-index: auto;
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-fadeInUp {
        animation: fadeInUp 1s ease forwards;
      }
      
      @keyframes zoom {
        0%,
        100% {
          transform: scale(1.1);
        }
        50% {
          transform: scale(1.2);
        }
      }
    </style>
  </head>
  <body class="flex flex-col justify-center items-center w-screen h-screen text-2xl font-bold p-0 m-0 bg-black text-white animate-fadeInUp">
    <h1>Welcome to broker login page</h1>
    <p class="text-xl text-green-500 font-bold" id="msg"></p>
    <form id="brokerLoginForm" method="POST">
      {% csrf_token %}
      <input type="tel" class="w-full border p-2 rounded-xl mb-4 bg-transparent outline-none" name="phone" id="phone" placeholder="Enter phone" autofocus />
      <div id="otp-box" class="hidden">
        <input type="text" class="w-full border p-2 rounded-xl mb-4" name="otp" id="otp" placeholder="Enter OTP (after sending)" />
      </div>
      <div id="profileFields" class="hidden">
        <input type="file" name="img" id="img" class="w-full border p-2 mb-4 rounded-xl" />
        <input type="text" name="uname" id="uname" class="w-full border p-2 mb-4 rounded-xl" placeholder="username" />
        <select name="state" id="state" class="w-full border p-2 mb-4 rounded-xl">
          <option value="1">Gujarat</option>
        </select>
        <select name="city" id="city" class="w-full border p-2 mb-4 rounded-xl">
          <option value="1">Ahmedabad</option>
        </select>
      </div>
      <button type="submit" id="btn" class="w-full p-2 rounded-3 mb-4 bg-blue-600">Continue</button>
    </form>
  </body>
</html>
